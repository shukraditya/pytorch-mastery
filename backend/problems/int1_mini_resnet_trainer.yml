description: |
  Build a complete 3-layer ResNet for CIFAR-10 and verify the forward pass.

  Implement `create_mini_resnet(batch_size=1)` that:

  1. Defines a `ResidualBlock(channels)` module with:
     - `Conv2d → BatchNorm2d → ReLU → Conv2d → BatchNorm2d`
     - A skip connection adding the input to the block output
     - ReLU after the add

  2. Defines a `MiniResNet` module with:
     - `Conv2d(3, 16, kernel_size=3, padding=1)`
     - `BatchNorm2d(16)`
     - `ReLU`
     - `ResidualBlock(16)`
     - `AdaptiveAvgPool2d(1)`
     - `Flatten`
     - `Linear(16, 10)`

  3. Generates a random input of shape `(batch_size, 3, 32, 32)`
  4. Returns the forward-pass output logits

  The harness only checks that the output has the correct shape and dtype — but getting there means you correctly wired conv, batch norm, residual blocks, pooling, and a classifier head.

  **Self-test:** After passing the harness, try training this model on CIFAR-10 for 10 epochs. Can you hit >60% validation accuracy?
