id: cv1
title: Conv2d Naive
day: 11
week: 4
difficulty: Hard
focus: Stride, padding, shape arithmetic
description: 'Implement a naive 2D convolution `conv2d_naive(x, weight, bias, stride,
  padding)`.


  Use `F.pad` and nested loops (or unfold) to apply the kernel.

  Return the output feature maps.

  '
starter_code: "import torch\nimport torch.nn.functional as F\n\ndef conv2d_naive(x,\
  \ weight, bias, stride, padding):\n    \"\"\"Naive Conv2d implementation.\"\"\"\n\
  \    pass\n"
function_name: conv2d_naive
test_cases:
  visible:
  - name: Basic
    setup: 'weight = torch.ones(1, 1, 3, 3)

      bias = torch.zeros(1)

      '
    inputs:
      x: torch.ones(1, 1, 5, 5)
      weight: weight
      bias: bias
      stride: 1
      padding: 0
    expected:
      shape:
      - 1
      - 1
      - 3
      - 3
  - name: With Padding
    setup: 'weight = torch.ones(1, 1, 3, 3)

      bias = torch.zeros(1)

      '
    inputs:
      x: torch.ones(1, 1, 5, 5)
      weight: weight
      bias: bias
      stride: 1
      padding: 1
    expected:
      shape:
      - 1
      - 1
      - 5
      - 5
  hidden:
  - name: Stride 2
    setup: 'weight = torch.ones(2, 1, 2, 2)

      bias = torch.zeros(2)

      '
    inputs:
      x: torch.ones(1, 1, 4, 4)
      weight: weight
      bias: bias
      stride: 2
      padding: 0
    expected:
      shape:
      - 1
      - 2
      - 2
      - 2
  - name: Multi In Out
    setup: 'weight = torch.ones(3, 2, 2, 2)

      bias = torch.zeros(3)

      '
    inputs:
      x: torch.ones(1, 2, 4, 4)
      weight: weight
      bias: bias
      stride: 1
      padding: 0
    expected:
      shape:
      - 1
      - 3
      - 3
      - 3
validation:
  type: match_tensor
prerequisites:
- sh3
lines_estimate: 60
time_estimate: 3-4 hrs
tier: depth
