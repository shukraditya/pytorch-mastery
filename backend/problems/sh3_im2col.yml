id: sh3
title: Im2Col
day: 10
week: 4
difficulty: Hard
focus: Convolution as matrix multiplication
description: 'Implement `im2col(x, kernel_size, stride, padding)` that extracts image
  patches into columns.


  Input: `(N, C, H, W)`

  Output: `(N, C * kH * kW, outH * outW)`


  Use `torch.nn.functional.unfold` under the hood, or implement manually.

  '
starter_code: "import torch\nimport torch.nn.functional as F\n\ndef im2col(x, kernel_size,\
  \ stride, padding):\n    \"\"\"Extract image patches into columns.\"\"\"\n    pass\n"
function_name: im2col
test_cases:
  visible:
  - name: Basic
    inputs:
      x: torch.arange(16).float().reshape(1, 1, 4, 4)
      kernel_size: 2
      stride: 2
      padding: 0
    expected:
      shape:
      - 1
      - 4
      - 4
  - name: With Padding
    inputs:
      x: torch.arange(9).float().reshape(1, 1, 3, 3)
      kernel_size: 3
      stride: 1
      padding: 1
    expected:
      shape:
      - 1
      - 9
      - 9
  hidden:
  - name: Multi Channel
    inputs:
      x: torch.randn(2, 3, 4, 4)
      kernel_size: 2
      stride: 2
      padding: 0
    expected:
      shape:
      - 2
      - 12
      - 4
  - name: Stride 1
    inputs:
      x: torch.randn(1, 1, 5, 5)
      kernel_size: 3
      stride: 1
      padding: 0
    expected:
      shape:
      - 1
      - 9
      - 9
validation:
  type: match_tensor
prerequisites:
- sh1
- sh2
lines_estimate: 50
time_estimate: 2-3 hrs
tier: depth
