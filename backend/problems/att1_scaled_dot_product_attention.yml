id: att1
title: Scaled Dot-Product Attention
day: 9
week: 3
difficulty: Medium
focus: QK^T / sqrt(d_k), causal masking
description: |
  Implement `scaled_dot_product_attention(Q, K, V, mask=None)`.

  Steps:
  1. scores = Q @ K^T / sqrt(d_k)
  2. If mask is provided, set masked positions to -inf
  3. softmax over last dim
  4. output = attention @ V

  Return the output tensor.
starter_code: |
  import torch
  import math

  def scaled_dot_product_attention(Q, K, V, mask=None):
      """Compute scaled dot-product attention."""
      pass
function_name: scaled_dot_product_attention
test_cases:
  visible:
    - name: Basic
      inputs:
        Q: torch.tensor([[[1.0, 0.0], [0.0, 1.0]]])
        K: torch.tensor([[[1.0, 0.0], [0.0, 1.0]]])
        V: torch.tensor([[[1.0, 2.0], [3.0, 4.0]]])
        mask: None
      expected:
        value: torch.tensor([[[2.0, 3.0], [2.0, 3.0]]])
    - name: With Mask
      inputs:
        Q: torch.tensor([[[1.0, 0.0], [0.0, 1.0]]])
        K: torch.tensor([[[1.0, 0.0], [0.0, 1.0]]])
        V: torch.tensor([[[1.0, 2.0], [3.0, 4.0]]])
        mask: torch.tensor([[[0, 1], [0, 0]]])
      expected:
        value: torch.tensor([[[1.0, 2.0], [2.0, 3.0]]])
  hidden:
    - name: Batch
      inputs:
        Q: torch.randn(2, 4, 8)
        K: torch.randn(2, 4, 8)
        V: torch.randn(2, 4, 8)
        mask: None
      expected:
        shape: [2, 4, 8]
    - name: Causal
      inputs:
        Q: torch.ones(1, 3, 2)
        K: torch.ones(1, 3, 2)
        V: torch.arange(6).float().reshape(1, 3, 2)
        mask: torch.triu(torch.ones(3, 3), diagonal=1).bool()
      expected:
        shape: [1, 3, 2]
validation:
  type: allclose
  rtol: 1e-03
  atol: 1e-05
