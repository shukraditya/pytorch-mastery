id: sch1
title: Warmup + Cosine LR
day: 8
week: 3
difficulty: Medium
focus: LR scheduling at scale
description: 'Write a function `get_lr(base_lr, step, warmup_steps, total_steps)`
  that returns the learning rate for a given step using linear warmup followed by
  cosine decay.


  If `step < warmup_steps`: `lr = base_lr * step / warmup_steps`

  Else: `lr = base_lr * 0.5 * (1 + cos(pi * (step - warmup_steps) / (total_steps -
  warmup_steps)))`

  '
starter_code: "import torch\nimport math\n\ndef get_lr(base_lr, step, warmup_steps,\
  \ total_steps):\n    \"\"\"Compute LR with linear warmup + cosine decay.\"\"\"\n\
  \    pass\n"
function_name: get_lr
test_cases:
  visible:
  - name: Warmup
    inputs:
      base_lr: 0.001
      step: 5
      warmup_steps: 10
      total_steps: 100
    expected:
      value: torch.tensor(0.0005)
  - name: Cosine
    inputs:
      base_lr: 0.001
      step: 55
      warmup_steps: 10
      total_steps: 100
    expected:
      value: torch.tensor(0.0005)
  hidden:
  - name: Start
    inputs:
      base_lr: 0.001
      step: 0
      warmup_steps: 10
      total_steps: 100
    expected:
      value: torch.tensor(0.0)
  - name: End
    inputs:
      base_lr: 0.001
      step: 100
      warmup_steps: 10
      total_steps: 100
    expected:
      value: torch.tensor(0.0005)
validation:
  type: allclose
  rtol: 1e-05
  atol: 1e-08
prerequisites:
- tl1
lines_estimate: 10
time_estimate: 20 min
tier: depth
