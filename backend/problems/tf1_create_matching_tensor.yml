id: tf1
title: Create Matching Tensor
day: 1
week: 1
difficulty: Easy
focus: Device/dtype/shape awareness
description: 'Write a function `create_matching_tensor(x)` that returns a new tensor
  with the same **shape**, **dtype**, and **device** as the input tensor `x`, but
  filled with ones.


  This tests your awareness that PyTorch tensors carry device and dtype metadata,
  not just values.

  '
starter_code: "import torch\n\ndef create_matching_tensor(x: torch.Tensor) -> torch.Tensor:\n\
  \    \"\"\"Return a tensor of ones matching x's shape, dtype, and device.\"\"\"\n\
  \    pass\n"
function_name: create_matching_tensor
test_cases:
  visible:
  - name: CPU Float32
    inputs:
      x: torch.ones(3, 4, dtype=torch.float32)
    expected:
      shape:
      - 3
      - 4
      dtype: float32
      device: cpu
      value: torch.ones(3, 4, dtype=torch.float32)
  - name: CPU Int64
    inputs:
      x: torch.zeros(2, dtype=torch.int64)
    expected:
      shape:
      - 2
      dtype: int64
      device: cpu
      value: torch.ones(2, dtype=torch.int64)
  hidden:
  - name: Non-contiguous
    inputs:
      x: torch.randn(4, 4).t()
    expected:
      shape:
      - 4
      - 4
      dtype: float32
      device: cpu
      value: torch.ones(4, 4, dtype=torch.float32)
  - name: Float16
    inputs:
      x: torch.ones(1, 1, dtype=torch.float16)
    expected:
      shape:
      - 1
      - 1
      dtype: float16
      device: cpu
      value: torch.ones(1, 1, dtype=torch.float16)
validation:
  type: match_tensor
prerequisites: []
lines_estimate: 5
time_estimate: 15 min
tier: core
