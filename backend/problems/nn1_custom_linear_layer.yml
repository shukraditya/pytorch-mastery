id: nn1
title: Custom Linear Layer
day: 4
week: 2
difficulty: Medium
focus: nn.Parameter, weight init shapes
description: 'Implement a custom linear layer `MyLinear(in_features, out_features)`
  as a `torch.nn.Module`.


  Initialize weights with Xavier uniform (`torch.nn.init.xavier_uniform_`) and biases
  to zeros.


  In forward, compute `x @ W^T + b`.

  '
starter_code: "import torch\nimport torch.nn as nn\n\nclass MyLinear(nn.Module):\n\
  \    def __init__(self, in_features: int, out_features: int):\n        super().__init__()\n\
  \        pass\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n     \
  \   pass\n\ndef custom_linear(x: torch.Tensor, in_features: int, out_features: int)\
  \ -> torch.Tensor:\n    \"\"\"Apply custom linear layer.\"\"\"\n    layer = MyLinear(in_features,\
  \ out_features)\n    return layer(x)\n"
function_name: custom_linear
test_cases:
  visible:
  - name: Basic
    inputs:
      x: torch.randn(2, 3)
      in_features: 3
      out_features: 5
    expected:
      shape:
      - 2
      - 5
  - name: Batch
    inputs:
      x: torch.randn(10, 20)
      in_features: 20
      out_features: 1
    expected:
      shape:
      - 10
      - 1
  hidden:
  - name: Single Sample
    inputs:
      x: torch.randn(1, 4)
      in_features: 4
      out_features: 4
    expected:
      shape:
      - 1
      - 4
  - name: Large
    inputs:
      x: torch.randn(64, 128)
      in_features: 128
      out_features: 256
    expected:
      shape:
      - 64
      - 256
validation:
  type: match_tensor
prerequisites: []
lines_estimate: 15
time_estimate: 45 min
tier: core
